<!DOCTYPE html>
<html>
<head>
  <title>Form Exercise #2</title>
</head>
<body>
  <form action="https://drhws.net/webdev/formsubmit.php" method="get">
    <label for="fname">Enter your First Name:</label>
    <input type="text" id="fname" name="First"><br><br>

    <label for="lname">Enter your Last Name:</label>
    <input type="text" id="lname" name="Last"><br><br>

    <label for="pwd">Create a Password:</label>
    <input type="password" id="pwd" name="Pwd"><br><br>

    <label for="pwdconfirm">Confirm Password:</label>
    <input type="password" id="pwdconfirm" name="PwdConfirm"><br><br>

    <label for="offers">Send me special offers:</label>
    <input type="checkbox" id="offers" name="Offers" value="Yes"><br><br>

    <input type="submit" value="Submit">
  </form>
</body>
</html>
